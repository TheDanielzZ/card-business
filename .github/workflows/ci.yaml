name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Python 3
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Instalar requirements
        run:
          pip install -r requirements.txt
      - name: instalacao do pytest
        run:
          pip install pytest
      - name: executar testes
        run: pytest
    

